apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-reader

rules:
- apiGroups: [""]
  resources:
    - pods
  verbs:
    - get
    - list
    - watch

- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-reader-binding

subjects:
- kind: ServiceAccount
  name: default
  namespace: default

roleRef:
  kind: ClusterRole
  name: metrics-reader
  apiGroup: rbac.authorization.k8s.io