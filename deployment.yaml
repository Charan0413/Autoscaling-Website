apiVersion: apps/v1
kind: Deployment
metadata:
  name: techstore-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: techstore-backend

  template:
    metadata:
      labels:
        app: techstore-backend

    spec:
      containers:
      - name: techstore-backend
        image: 128624577275.dkr.ecr.ap-south-1.amazonaws.com/techstore-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"